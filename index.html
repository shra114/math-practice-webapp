<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Little Learners Arithmetic Game</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Trebuchet MS", "Comic Sans MS", "Segoe UI", Arial, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 18px;
        color: #2f2a19;
        background:
          radial-gradient(circle at 15% 15%, #fff1cc 0, transparent 35%),
          radial-gradient(circle at 82% 20%, #dbeafe 0, transparent 30%),
          linear-gradient(135deg, #ffe4b5 0%, #f5d0a9 35%, #eac79f 100%);
      }

      .app {
        width: min(980px, 97vw);
        background: #f8ecd5;
        border: 4px solid #b07b45;
        border-radius: 22px;
        box-shadow:
          0 20px 30px rgba(88, 53, 21, 0.25),
          inset 0 0 0 4px #f2d9aa;
        padding: 24px;
        display: grid;
        gap: 22px;
        grid-template-columns: 1fr 1fr;
      }

      .game-panel {
        background: #1f5138;
        border: 3px solid #16513a;
        border-radius: 14px;
        box-shadow: inset 0 0 0 3px rgba(255, 255, 255, 0.1);
        padding: 18px;
      }

      .game-panel h1 {
        margin: 0 0 14px;
        font-size: clamp(1.4rem, 2vw, 1.9rem);
        color: #fef9c3;
        text-shadow: 1px 1px 0 #234029;
        letter-spacing: 0.3px;
      }

      .question {
        font-size: clamp(1.5rem, 2.4vw, 2rem);
        margin: 14px 0;
        font-weight: 800;
        color: #fffef8;
        background: rgba(7, 24, 17, 0.45);
        border: 2px dashed #fef08a;
        border-radius: 14px;
        padding: 12px 14px;
        text-align: center;
      }

      .controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .question-setup {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 10px;
        align-items: center;
      }

      .question-setup select,
      input[type="number"] {
        border: 2px solid #d6a15c;
        background: #fffdf3;
        color: #3a2f1a;
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 1rem;
        box-shadow: 0 3px 6px rgba(63, 39, 16, 0.15);
        transition: all 0.2s ease;
      }

      .question-setup select {
        min-width: 170px;
      }

      input[type="number"] {
        width: 172px;
      }

      #answerInput {
        border: 2px solid #facc15;
        background: #fffef0;
      }

      .question-setup select:focus,
      input[type="number"]:focus {
        outline: none;
        border-color: #f97316;
        box-shadow: 0 0 0 4px rgba(251, 146, 60, 0.25);
      }

      button {
        border: none;
        border-radius: 11px;
        padding: 10px 16px;
        font-size: 0.98rem;
        font-weight: 700;
        cursor: pointer;
        color: #ffffff;
        background: linear-gradient(180deg, #f59e0b 0%, #ea580c 100%);
        box-shadow: 0 6px 0 #9a3412;
        transition: transform 0.1s ease, filter 0.2s ease;
      }

      button:hover {
        filter: brightness(1.05);
      }

      button:active {
        transform: translateY(2px);
        box-shadow: 0 4px 0 #9a3412;
      }

      .meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .meta div {
        background: #fff7cf;
        border: 2px solid #facc15;
        border-radius: 999px;
        padding: 7px 12px;
        font-weight: 700;
        color: #3f341f;
      }

      .status {
        min-height: 26px;
        margin-top: 8px;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .status.ok {
        color: #bbf7d0;
      }

      .status.error {
        color: #fecaca;
      }

      .review-panel {
        background:
          repeating-linear-gradient(
            to bottom,
            #fffef7,
            #fffef7 27px,
            #dbeafe 28px,
            #fffef7 29px
          );
        border: 3px solid #93c5fd;
        border-radius: 14px;
        padding: 14px 16px;
        box-shadow: inset 0 0 0 2px #eff6ff;
      }

      .review-panel h2 {
        margin-top: 0;
        margin-bottom: 8px;
        font-size: 1.1rem;
        color: #1e3a8a;
      }

      #wrongList {
        margin: 8px 0 16px;
        padding-left: 18px;
        max-height: 220px;
        overflow: auto;
      }

      #wrongList li {
        margin-bottom: 6px;
        color: #1f2937;
      }

      .review-file {
        background: #ffffff;
        border: 2px solid #bfdbfe;
        border-radius: 10px;
        padding: 12px;
        min-height: 160px;
        white-space: pre-wrap;
        color: #0f172a;
        font-family:
          ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.9rem;
      }

      @media (max-width: 750px) {
        body {
          padding: 10px;
        }

        .app {
          grid-template-columns: 1fr;
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="game-panel">
        <h1>Math Game</h1>
        <div class="question-setup">
          <input
            id="operandAMinInput"
            type="number"
            placeholder="Operand A min"
          />
          <input
            id="operandAMaxInput"
            type="number"
            placeholder="Operand A max"
          />
          <select id="operationSelect">
            <option value="multiply">Multiplication (x)</option>
            <option value="add">Addition (+)</option>
            <option value="subtract">Subtraction (-)</option>
            <option value="divide">Division (/)</option>
          </select>
          <input
            id="operandTwoInput"
            type="number"
            placeholder="Operand B start (1-10)"
          />
        </div>
        <div id="questionText" class="question">0 x 0 = ?</div>
        <div class="controls">
          <input
            id="answerInput"
            type="number"
            placeholder="Enter your answer"
          />
          <button id="submitBtn" type="button">Submit</button>
        </div>
        <div class="meta">
          <div>Score: <span id="scoreText">0/0</span></div>
          <div>Correct: <span id="correctText">0</span></div>
          <div>Total: <span id="totalText">0</span></div>
        </div>
        <div id="statusText" class="status"></div>
      </section>

      <aside class="review-panel">
        <h2>Wrong Questions (review.txt)</h2>
        <ul id="wrongList"></ul>
        <button id="downloadBtn" type="button">Download review.txt</button>
        <h2 style="margin-top: 16px">review.txt Preview</h2>
        <pre id="reviewPreview" class="review-file">No wrong answers yet.</pre>
      </aside>
    </main>

    <script>
      const questionText = document.getElementById("questionText");
      const operandAMinInput = document.getElementById("operandAMinInput");
      const operandAMaxInput = document.getElementById("operandAMaxInput");
      const operandTwoInput = document.getElementById("operandTwoInput");
      const operationSelect = document.getElementById("operationSelect");
      const answerInput = document.getElementById("answerInput");
      const submitBtn = document.getElementById("submitBtn");
      const scoreText = document.getElementById("scoreText");
      const correctText = document.getElementById("correctText");
      const totalText = document.getElementById("totalText");
      const statusText = document.getElementById("statusText");
      const wrongList = document.getElementById("wrongList");
      const reviewPreview = document.getElementById("reviewPreview");
      const downloadBtn = document.getElementById("downloadBtn");

      let a = 0;
      let b = 0;
      let operation = "multiply";
      let correct = 0;
      let total = 0;
      const wrongQuestions = [];

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function getOperationSymbol(type) {
        if (type === "add") return "+";
        if (type === "subtract") return "-";
        if (type === "divide") return "/";
        return "x";
      }

      function calculateAnswer(left, right, type) {
        if (type === "add") return left + right;
        if (type === "subtract") return left - right;
        if (type === "divide") return left / right;
        return left * right;
      }

      function toStartValue(rawValue, fallback, min, max) {
        if (rawValue === "") return fallback;
        const parsed = Math.floor(Number(rawValue));
        if (Number.isNaN(parsed)) return fallback;
        return Math.min(max, Math.max(min, parsed));
      }

      function nextQuestion() {
        const rawAMin = operandAMinInput.value.trim();
        const rawAMax = operandAMaxInput.value.trim();
        const rawB = operandTwoInput.value.trim();
        operation = operationSelect.value;

        const minA = toStartValue(rawAMin, 1, 1, 999);
        const maxAInput = toStartValue(rawAMax, 20, 1, 999);
        const maxA = Math.max(minA, maxAInput);
        const startB = toStartValue(rawB, 1, 1, 10);

        a = randomInt(minA, maxA);
        b = randomInt(startB, 10);

        const symbol = getOperationSymbol(operation);
        questionText.textContent = `${a} ${symbol} ${b} = ?`;
        answerInput.value = "";
        answerInput.focus();
      }

      function updateScore() {
        scoreText.textContent = `${correct}/${total}`;
        correctText.textContent = String(correct);
        totalText.textContent = String(total);
      }

      function buildReviewText() {
        if (wrongQuestions.length === 0) {
          return "No wrong answers yet.";
        }
        return wrongQuestions
          .map((item, idx) => {
            return `${idx + 1}. ${item.question} | Your answer: ${item.given} | Correct: ${item.correct}`;
          })
          .join("\n");
      }

      function refreshReviewPanel() {
        wrongList.innerHTML = "";
        if (wrongQuestions.length === 0) {
          const li = document.createElement("li");
          li.textContent = "No wrong answers yet.";
          wrongList.appendChild(li);
        } else {
          wrongQuestions.forEach((item) => {
            const li = document.createElement("li");
            li.textContent = `${item.question} -> you: ${item.given}, correct: ${item.correct}`;
            wrongList.appendChild(li);
          });
        }
        reviewPreview.textContent = buildReviewText();
      }

      function downloadReviewFile() {
        const content = buildReviewText();
        const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "review.txt";
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      }

      function submitAnswer() {
        const raw = answerInput.value.trim();
        if (raw === "") {
          statusText.textContent = "Please enter an answer.";
          statusText.className = "status error";
          return;
        }

        const userAnswer = Number(raw);
        const actualAnswer = calculateAnswer(a, b, operation);
        const symbol = getOperationSymbol(operation);
        total += 1;

        if (userAnswer === actualAnswer) {
          correct += 1;
          statusText.textContent = "Correct!";
          statusText.className = "status ok";
        } else {
          statusText.textContent = `Wrong. ${a} ${symbol} ${b} = ${actualAnswer}`;
          statusText.className = "status error";
          wrongQuestions.push({
            question: `${a} ${symbol} ${b}`,
            given: userAnswer,
            correct: actualAnswer,
          });
        }

        updateScore();
        refreshReviewPanel();
        nextQuestion();
      }

      submitBtn.addEventListener("click", submitAnswer);
      downloadBtn.addEventListener("click", downloadReviewFile);
      operationSelect.addEventListener("change", nextQuestion);
      operandAMinInput.addEventListener("input", nextQuestion);
      operandAMaxInput.addEventListener("input", nextQuestion);
      operandTwoInput.addEventListener("input", nextQuestion);
      answerInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          submitAnswer();
        }
      });

      updateScore();
      refreshReviewPanel();
      nextQuestion();
    </script>
  </body>
</html>
